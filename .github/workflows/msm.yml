name: Compile Kernel (MSM MOVE)

on:
  workflow_dispatch:
    inputs:
      msmmove:
        description: "4.19.325 Move to MSM-5.4"
        required: true
        type: string
        default: "Yes"

      soc:
        description: "SOC: Type your soc"
        required: true
        type: string
        default: "gauguin"

      clang_version:
        description: "Clang-Version: Select the clang version of ur kernel"
        required: true
        type: choice
        default: clang-r563880c
        options:
          - clang-r563880c

      kernel_configs_manual:
        description: "Kernel-Configs-Manual: If u selected Manual-Type in previous options, manually type ur kernel configs here."
        required: false
        type: string
        default: "vendor/lito-perf_defconfig vendor/xiaomi/gauguin.config"

      enable_gcc:
        description: "Enable-GCC: Enable the GCC support"
        required: true
        type: boolean
        default: true

jobs:
  Kernel_CI:
    env:
        GH_TOKEN: ${{ github.token }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
      checks: read
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup SWAP
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 16
          
      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y \
          bc bison flex \
          libssl-dev \
          libelf-dev \
          libdw-dev \
          build-essential \
          lz4 \
          git \
          python3 \
          curl \
          dwarves \
          cpio \
          gcc-aarch64-linux-gnu \
          linux-tools-common
          
      - name: Clone Kernel Source
        run: |
          git clone https://git.codelinaro.org/clo/la/kernel/msm-5.4.git --depth=1 gauguin       
          
      - name: Download AOSP Clang
        run: |
              curl -LO https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/android16-qpr2-release/clang-r563880c.tar.gz

              mkdir -p toolchains/clang-r563880c
          
              tar -xf "clang-r563880c.tar.gz" -C "toolchains/clang-r563880c" || exit 1
         
      - name: MSM Move 
        run: |
         cd ${GITHUB_WORKSPACE}/gauguin/
         mkdir ${GITHUB_WORKSPACE}/gauguin/arch/arm64/configs/vendor
         mkdir ${GITHUB_WORKSPACE}/gauguin/arch/arm64/configs/vendor/xiaomi
         cp ${GITHUB_WORKSPACE}/msm/qcom.zip ${GITHUB_WORKSPACE}/gauguin/
         unzip ${GITHUB_WORKSPACE}/gauguin/qcom.zip
         cp ${GITHUB_WORKSPACE}/gauguin/vendor/lito-perf_defconfig ${GITHUB_WORKSPACE}/gauguin/arch/arm64/configs/vendor/
         cp ${GITHUB_WORKSPACE}/gauguin/vendor/xiaomi/gauguin.config ${GITHUB_WORKSPACE}/gauguin/arch/arm64/configs/vendor/xiaomi/
         cp -r ${GITHUB_WORKSPACE}/gauguin/qcom/camera ${GITHUB_WORKSPACE}/gauguin/arch/arm64/boot/dts/qcom/
         cp -r ${GITHUB_WORKSPACE}/gauguin/qcom/display ${GITHUB_WORKSPACE}/gauguin/arch/arm64/boot/dts/qcom/
         rm -f ${GITHUB_WORKSPACE}/gauguin/qcom/camera 
         rm -f ${GITHUB_WORKSPACE}/gauguin/qcom/display
         cp ${GITHUB_WORKSPACE}/gauguin/qcom/* ${GITHUB_WORKSPACE}/gauguin/arch/arm64/boot/dts/qcom/
         
      - name: Make Kernel Configs
        run: |
          CLANG_ROOT="${GITHUB_WORKSPACE}/toolchains/clang-r563880c/bin"
          export PATH="${CLANG_ROOT}:$PATH"
          export ARCH=arm64
          export SUBARCH=arm64
          export LLVM=1
          export LLVM_IAS=1
          export CROSS_COMPILE=aarch64-linux-gnu-


          cd ${{ inputs.soc }} || exit 1
          
            make O=out ${{ inputs.kernel_configs_manual }} 
          
      - name: Build Kernel Image
        run: |
          CLANG_ROOT="${GITHUB_WORKSPACE}/toolchains/${{ inputs.clang_version }}/bin"
          export PATH="${CLANG_ROOT}:$PATH"
          export ARCH=arm64
          export SUBARCH=arm64
          export LLVM=1
          export LLVM_IAS=1

          if [[ "${{ inputs.enable_gcc }}" == "true" ]]; then

            export CROSS_COMPILE=aarch64-linux-gnu-
            
          fi

          if [[ "${{ inputs.enable_gcc_32bits }}" == "true" ]]; then
            
            export CROSS_COMPILE_ARM32=${GITHUB_WORKSPACE}/toolchains/arm-linux-androideabi/bin/arm-linux-androideabi-
          
          fi

          cd ${{ inputs.soc }} || exit 1
          
          make -j$(nproc) O=out Image 2>&1 | tee ${GITHUB_WORKSPACE}/build.log
          
      - name: Make AnyKernel3
        run: |
          ZIP_NAME="kernel.zip"
          git clone https://github.com/Kernel-SU/AnyKernel3.git
          cp ${{ inputs.soc }}/out/arch/arm64/boot/Image ./Image
          cd AnyKernel3 || exit 1

          sed -i "s|ksu_supported=false|ksu_supported=true|" anykernel.sh

          zip -r9 ../"${ZIP_NAME}.zip" * -x .git

      - name: Upload to GitHub Actions Artifacts
        uses: actions/upload-artifact@v4
        with:
         name: kernel
         path: |
          *.zip
          Image
          build.log
          options.txt
         if-no-files-found: error
         compression-level: 6
