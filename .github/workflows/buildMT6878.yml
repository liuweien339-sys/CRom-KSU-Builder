name: Compile Kernel MT6878

on:
  workflow_dispatch:
jobs:
  Kernel:
    env:
        GH_TOKEN: ${{ github.token }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
      checks: read
    steps:
      - uses: actions/checkout@v7
      
      - name: Setup SWAP
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 16
          
      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y \
          bc bison flex \
          libssl-dev \
          libelf-dev \
          libdw-dev \
          build-essential \
          lz4 \
          git \
          python3 \
          curl \
          dwarves \
          cpio \
          gcc-aarch64-linux-gnu \
          linux-tools-common
          
      - name: Clone Kernel Source
        run: |
          git clone https://github.com/liuweien339-sys/android_kernel_oneplus_mt6878.git --depth=1 -b oneplus/mt6878_b_16.0_turbo_6x mt6878
          git clone https://github.com/liuweien339-sys/android_kernel_modules_and_devicetree_oneplus_mt6878 --depth=1 -b oneplus/mt6878_b_16.0_turbo_6x modules
          cp -r ${GITHUB_WORKSPACE}/modules/vendor ${GITHUB_WORKSPACE}/ 
          cp -r ${GITHUB_WORKSPACE}/modules/kernel ${GITHUB_WORKSPACE}/

      - name: Confirm 
        run: |
          ls ${GITHUB_WORKSPACE}/vendor
          ls ${GITHUB_WORKSPACE}/kernel
          
      - name: Download AOSP Clang
        run: |
              curl -LO https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/android14-qpr3-release/clang-r487747c.tar.gz

              mkdir -p toolchains/clang-r487747c
          
              tar -xf "clang-r487747c.tar.gz" -C "toolchains/clang-r487747c"
              
      - name: Include DroidSpaces & susfs
        run: |
              cd mt6878
              curl -Lo patch-for-below-6.12.patch https://raw.githubusercontent.com/ravindu644/Droidspaces-OSS/refs/heads/main/Documentation/resources/kernel-patches/GKI/below-kernel-6.12/001.GKI-below-6.12-fix_sysvipc_kabi_6_7_8.patch || exit 1
              patch -p1 < patch-for-below-6.12.patch

              git clone -b gki-android14-6.1 https://gitlab.com/simonpunk/susfs4ksu.git susfs
              cd susfs 
              cp ${GITHUB_WORKSPACE}/susfs/kernel_patches/50_add_susfs_in_gki-android14-6.1.patch ${GITHUB_WORKSPACE}/mt6878/susfs.patch
              cp ${GITHUB_WORKSPACE}/susfs/kernel_patches/fs/* ${GITHUB_WORKSPACE}/mt6878/fs/
              cp ${GITHUB_WORKSPACE}/susfs/kernel_patches/include/linux/* ${GITHUB_WORKSPACE}/mt6878/include/linux/

              patch -p1 < susfs.patch

      - name: Build Kernel Image
        run: |
          CLANG_ROOT="${GITHUB_WORKSPACE}/toolchains/clang-r487747c/bin"
          export PATH="${CLANG_ROOT}:$PATH"
          export ARCH=arm64
          export SUBARCH=arm64
          export LLVM=1
          export LLVM_IAS=1
          export CROSS_COMPILE=aarch64-linux-gnu-
            
          cd mt6878
          make mrproper || true
          make turbo6x-mt6878_defconfig
          make -j$(nproc) Image 2>&1 | tee ${GITHUB_WORKSPACE}/build.log

      - name: Upload Build Summary 
        run: |
            
            cd mt6878
          
            tar -czf ../build.tar.gz arch/arm64/

      - name: Upload to GitHub Actions Artifacts
        uses: actions/upload-artifact@v7
        with:
         name: kernel
         path: |
          build.tar.gz
          build.log
         if-no-files-found: warn
         compression-level: 6
